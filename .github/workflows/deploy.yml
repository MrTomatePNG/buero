name: Deploy to Production
on:
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push App Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ vars.REPO }}/app:latest

      - name: Build and Push Caddy Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: config/Dockerfile
          push: true
          tags: ghcr.io/${{ vars.REPO }}/caddy:latest

      - name: Transfer Docker Compose
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "docker-compose.yml"
          target: "/opt/sewer-comedy"

      - name: Transfer Caddyfile
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "config/Caddyfile"
          target: "/opt/sewer-comedy"
          strip_components: 1

      - name: Deploy via Docker Compose
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/sewer-comedy
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Exportar ENVs para o docker-compose
            export GITHUB_REPOSITORY="${{ vars.REPO }}"
            export DB_USER="${{ secrets.DB_USER }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export DB_NAME="${{ secrets.DB_NAME }}"
            export REDIS_PASSWD="${{ secrets.PROD_REDIS_PASSWD }}"
            export PROD_BETTER_AUTH_SECRET="${{ secrets.PROD_BETTER_AUTH_SECRET }}"
            export PROD_BETTER_AUTH_BASE_URL="${{ secrets.PROD_BETTER_AUTH_BASE_URL }}"
            export S3_ACCESS_KEY="${{ secrets.PROD_S3_ACCESS_KEY }}"
            export S3_SECRET_KEY="${{ secrets.PROD_S3_SECRET_KEY }}"
            export S3_BUCKET_NAME="${{ vars.S3_BUCKET_NAME }}"
            export PROD_RESEND_API_KEY="${{ secrets.PROD_RESEND_API_KEY }}"

            # 1. Pull das imagens novas
            docker compose pull

            # 2. Garantir que o DB e Redis estejam rodando antes da migration
            docker compose up -d db redis minio

            # 3. Rodar Migrations (Usando a imagem do app recém buildada)
            echo "Rodando migrations..."
            docker run --rm \
              --network sewer-comedy_sewer-network \
              -e DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}" \
              ghcr.io/${{ vars.REPO }}/app:latest \
              bun prisma migrate deploy

            # 4. Subir o restante dos serviços
            docker compose up -d
            
            # Limpar imagens antigas
            docker image prune -f
