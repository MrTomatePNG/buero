services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}/app:latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=${PROD_DATABASE_URL}
      - REDIS_URL=${PROD_REDIS_URL}
      - REDIS_PASSWD=${PROD_REDIS_PASSWD}
      - BETTER_AUTH_SECRET=${PROD_BETTER_AUTH_SECRET}
      - BETTER_AUTH_BASE_URL=${PROD_BETTER_AUTH_BASE_URL}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_ACCESS_KEY=${PROD_S3_ACCESS_KEY}
      - S3_SECRET_KEY=${PROD_S3_SECRET_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_CDN_URL=${S3_CDN_URL}
      - RESEND_API_KEY=${PROD_RESEND_API_KEY}
      - ORIGIN=https://sewercomedy.fun
      - NODE_ENV=production
      - BODY_SIZE_LIMIT=10M
    networks:
      - sewer-network

  caddy:
    image: ghcr.io/${GITHUB_REPOSITORY}/caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - caddy_cache:/var/cache/caddy/media
      - /var/log/caddy:/var/log/caddy
    depends_on:
      - app
    networks:
      - sewer-network

networks:
  sewer-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  caddy_cache:
